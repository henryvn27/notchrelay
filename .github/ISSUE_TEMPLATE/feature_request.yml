name: Feature request
description: Suggest a focused improvement within Cowlick's scope
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What daily Codex workflow problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Privacy and approval safety impact
    validations:
      required: true
