name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Formatting
        run: xcrun swift-format lint --recursive --strict NotchRelay NotchRelayHook NotchRelayTests NotchRelayUITests
      - name: Unit tests
        run: xcodebuild -project NotchRelay.xcodeproj -scheme NotchRelay-UnitTests -derivedDataPath DerivedData -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO test
      - name: Build UI test bundle
        run: xcodebuild -project NotchRelay.xcodeproj -scheme NotchRelay-UITests -derivedDataPath DerivedData -destination 'platform=macOS' build-for-testing
      - name: Static analysis
        run: xcodebuild -project NotchRelay.xcodeproj -scheme NotchRelay -configuration Debug -derivedDataPath DerivedData -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO analyze
      - name: Verify installer script
        run: swiftc -typecheck Scripts/install_hooks.swift
      - name: Build release candidate
        run: xcodebuild -project NotchRelay.xcodeproj -scheme NotchRelay -configuration Release -derivedDataPath DerivedData -destination 'generic/platform=macOS' CODE_SIGN_IDENTITY=- build
      - name: Verify Sparkle signing pipeline
        run: ./Scripts/verify_update_signing.sh
      - name: Upload app for main
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NotchRelay-unsigned-inspection
          path: DerivedData/Build/Products/Release/NotchRelay.app
          if-no-files-found: error
          retention-days: 7

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.24.3
          GITLEAKS_SHA256: 9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c
        run: |
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "$archive"
          echo "$GITLEAKS_SHA256  $archive" | sha256sum --check
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks
      - name: Scan complete Git history
        run: |
          "$RUNNER_TEMP/gitleaks" detect --source . --redact --verbose --log-opts=--all
