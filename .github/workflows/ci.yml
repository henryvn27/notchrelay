name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      COWLICK_XCODE_JOBS: "2"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
      - name: Install XcodeGen
        run: ./Scripts/install_ci_xcodegen.sh
      - name: Generate project
        run: xcodegen generate
      - name: Formatting
        run: xcrun swift-format lint --recursive --strict Cowlick CowlickHook CowlickTests CowlickUITests
      - name: Unit tests
        run: xcodebuild -project Cowlick.xcodeproj -scheme Cowlick-UnitTests -derivedDataPath DerivedData -destination 'platform=macOS' -jobs "$COWLICK_XCODE_JOBS" CODE_SIGNING_ALLOWED=NO test
      - name: Run UI tests
        run: xcodebuild -project Cowlick.xcodeproj -scheme Cowlick-UITests -derivedDataPath DerivedData -destination 'platform=macOS' -jobs "$COWLICK_XCODE_JOBS" test
      - name: Static analysis
        run: xcodebuild -project Cowlick.xcodeproj -scheme Cowlick -configuration Debug -derivedDataPath DerivedData -destination 'platform=macOS' -jobs "$COWLICK_XCODE_JOBS" CODE_SIGNING_ALLOWED=NO analyze
      - name: Verify installer script
        run: |
          swiftc -typecheck Scripts/install_hooks.swift
          ./Scripts/test_hook_installer.sh
      - name: Verify release scripts
        run: |
          zsh -n Scripts/*.sh
          ./Scripts/test_verify_installation.sh
          ./Scripts/test_release_scripts.sh
          ./Scripts/test_launch_asset_tools.sh
          xcrun swift Scripts/validate_launch_assets.swift --source-ref "$(git rev-parse HEAD)"
      - name: Build release candidate
        run: xcodebuild -project Cowlick.xcodeproj -scheme Cowlick -configuration Release -derivedDataPath DerivedData -destination 'generic/platform=macOS' -jobs "$COWLICK_XCODE_JOBS" CODE_SIGN_IDENTITY=- build
      - name: Verify Sparkle signing pipeline
        run: ./Scripts/verify_update_signing.sh
      - name: Package app for inspection
        if: github.ref == 'refs/heads/main'
        run: ditto -c -k --sequesterRsrc --keepParent DerivedData/Build/Products/Release/Cowlick.app "$RUNNER_TEMP/Cowlick-unsigned-inspection.zip"
      - name: Upload app for main
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Cowlick-unsigned-inspection
          path: ${{ runner.temp }}/Cowlick-unsigned-inspection.zip
          if-no-files-found: error
          retention-days: 7

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Verify website
        run: ./Scripts/verify_website.sh
      - name: Install website test tools
        working-directory: Website
        run: npm ci --ignore-scripts
      - name: Install pinned website browser
        working-directory: Website
        run: npx playwright install --with-deps chromium
      - name: Smoke-test website in Chromium
        working-directory: Website
        run: npm test
      - name: Verify portable release provenance
        run: |
          bash -n Scripts/verify_release_provenance.sh
          ./Scripts/verify_release_provenance.sh HEAD HEAD >/dev/null
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.24.3
          GITLEAKS_SHA256: 9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c
        run: |
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "$archive"
          echo "$GITLEAKS_SHA256  $archive" | sha256sum --check
          tar -xzf "$archive" -C "$RUNNER_TEMP" gitleaks
      - name: Scan complete Git history
        run: |
          "$RUNNER_TEMP/gitleaks" detect --source . --redact --verbose --log-opts=--all
