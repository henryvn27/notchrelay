name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Import Developer ID certificate
        env:
          CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/notchrelay.keychain-db"
          certificate="$RUNNER_TEMP/notchrelay.p12"
          echo "$CERTIFICATE" | base64 -D > "$certificate"
          chmod 600 "$certificate"
          security create-keychain -p actions "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p actions "$keychain"
          security import "$certificate" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security list-keychains -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$keychain"
          echo "NOTARYTOOL_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
      - name: Configure notarization
        env:
          NOTARY_PRIVATE_KEY: ${{ secrets.NOTARY_PRIVATE_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          key="$RUNNER_TEMP/AuthKey.p8"
          echo "$NOTARY_PRIVATE_KEY" | base64 -D > "$key"
          chmod 600 "$key"
          xcrun notarytool store-credentials notchrelay-notary --key "$key" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" --keychain "$NOTARYTOOL_KEYCHAIN"
      - name: Resolve Developer ID identity
        run: |
          identity="$(security find-identity -v -p codesigning | sed -n 's/.*"\(Developer ID Application:[^"]*\)".*/\1/p' | head -1)"
          test -n "$identity"
          echo "DEVELOPER_ID_APPLICATION=$identity" >> "$GITHUB_ENV"
      - name: Build, sign, notarize, and staple
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          NOTARYTOOL_PROFILE: notchrelay-notary
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: ./Scripts/create_release.sh "${GITHUB_REF_NAME#v}"
      - name: Render Homebrew cask
        run: ./Scripts/render_homebrew_cask.sh "${GITHUB_REF_NAME#v}" "build/release-${GITHUB_REF_NAME#v}/NotchRelay-${GITHUB_REF_NAME#v}.dmg"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "build/release-$version/NotchRelay-$version.dmg" \
            "build/release-$version/NotchRelay-$version.zip" \
            "build/release-$version/checksums.txt" \
            "build/release-$version/appcast.xml" \
            --title "NotchRelay $version" \
            --notes-file CHANGELOG.md \
            --verify-tag
      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          content="$(base64 < Config/Homebrew/notchrelay.rb | tr -d '\n')"
          existing_sha="$(gh api repos/henryvn27/homebrew-notchrelay/contents/Casks/notchrelay.rb --jq .sha 2>/dev/null || true)"
          args=(-X PUT -f message="Update NotchRelay to ${GITHUB_REF_NAME#v}" -f content="$content" -f branch=main)
          if [[ -n "$existing_sha" ]]; then args+=(-f sha="$existing_sha"); fi
          gh api repos/henryvn27/homebrew-notchrelay/contents/Casks/notchrelay.rb "${args[@]}"
