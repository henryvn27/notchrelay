name: Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "Website/**"
      - "Assets/AppIcon/**"
      - "Assets/Screenshots/**"
      - "Assets/Social/github-social-preview.png"
      - "Scripts/build_website.sh"
      - "Scripts/verify_website.py"
      - "Scripts/verify_website.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cowlick-pages
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Verify website
        run: ./Scripts/verify_website.sh
      - name: Install website test tools
        working-directory: Website
        run: npm ci --ignore-scripts
      - name: Install pinned website browser
        working-directory: Website
        run: npx playwright install --with-deps chromium
      - name: Smoke-test website in Chromium
        working-directory: Website
        run: npm test
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: build/website

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
