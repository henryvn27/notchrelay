name: Cowlick
options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.44.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.4
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CLANG_ENABLE_MODULES: YES
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    VERSIONING_SYSTEM: apple-generic
targets:
  Cowlick:
    type: application
    platform: macOS
    sources:
      - path: Cowlick
    entitlements:
      path: Config/Cowlick.entitlements
    dependencies:
      - package: Sparkle
        product: Sparkle
      - sdk: Security.framework
      - target: CowlickHook
        embed: false
        link: false
    postBuildScripts:
      - name: Embed Cowlick Hook
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          helper_dir="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Helpers"
          mkdir -p "$helper_dir"
          cp "$BUILT_PRODUCTS_DIR/cowlick-hook" "$helper_dir/cowlick-hook"
          chmod 755 "$helper_dir/cowlick-hook"
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/cowlick-hook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.henryvn27.Cowlick
        PRODUCT_NAME: Cowlick
        PRODUCT_MODULE_NAME: Cowlick
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
  CowlickHook:
    type: tool
    platform: macOS
    sources:
      - path: CowlickHook
      - path: Cowlick/Support/ProductVersion.swift
      - path: Cowlick/Support/LifecycleLedger.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.henryvn27.Cowlick.Hook
        PRODUCT_NAME: cowlick-hook
        PRODUCT_MODULE_NAME: CowlickHook
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
  CowlickTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CowlickTests
      - path: CowlickHook
        excludes:
          - main.swift
      - path: Cowlick/Support/ProductVersion.swift
      - path: Cowlick/Support/LifecycleLedger.swift
    dependencies:
      - target: Cowlick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.henryvn27.CowlickTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Cowlick.app/Contents/MacOS/Cowlick
        BUNDLE_LOADER: $(TEST_HOST)
  CowlickUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: CowlickUITests
    dependencies:
      - target: Cowlick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.henryvn27.CowlickUITests
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: NO
schemes:
  Cowlick:
    build:
      targets:
        Cowlick: all
        CowlickHook: all
        CowlickTests: [test]
        CowlickUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - CowlickTests
        - CowlickUITests
    archive:
      config: Release
  Cowlick-UnitTests:
    build:
      targets:
        Cowlick: all
        CowlickHook: all
        CowlickTests: [test]
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - CowlickTests
  Cowlick-UITests:
    build:
      targets:
        Cowlick: all
        CowlickHook: all
        CowlickUITests: [test]
    test:
      config: Debug
      targets:
        - CowlickUITests
